version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: faceattend_app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./database/attendance.db
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - FACE_TOLERANCE=${FACE_TOLERANCE:-0.5}
    volumes:
      - ./database:/app/database
      - ./reports:/app/reports
      - ./backups:/app/backups
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional PostgreSQL (comment in if needed)
  # db:
  #   image: postgres:16-alpine
  #   container_name: faceattend_db
  #   environment:
  #     POSTGRES_USER: attendance
  #     POSTGRES_PASSWORD: attendance_pass
  #     POSTGRES_DB: attendance_db
  #   volumes:
  #     - pgdata:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"
  #   restart: unless-stopped

volumes:
  pgdata:
