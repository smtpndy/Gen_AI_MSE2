version: '3.8'

services:
  # Backend Flask Application
  backend:
    build: .
    container_name: faceattend-backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - FLASK_APP=app.py
      - SECRET_KEY=your-secret-key-change-this
      - SQLALCHEMY_DATABASE_URI=sqlite:///attendance.db
    volumes:
      - ./attendance.db:/app/attendance.db
      - ./uploads:/app/uploads
      - ./models:/app/models
      - ./logs:/app/logs
    networks:
      - faceattend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Web Server
  frontend:
    image: nginx:latest
    container_name: faceattend-frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - faceattend
    restart: unless-stopped

  # PostgreSQL Database (optional - for production)
  # postgres:
  #   image: postgres:15
  #   container_name: faceattend-db
  #   environment:
  #     POSTGRES_DB: faceattend
  #     POSTGRES_USER: admin
  #     POSTGRES_PASSWORD: secure_password_here
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   networks:
  #     - faceattend
  #   restart: unless-stopped

networks:
  faceattend:
    driver: bridge

volumes:
  postgres_data:
    driver: local
