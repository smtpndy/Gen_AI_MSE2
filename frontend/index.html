<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FaceAttend — AI Attendance System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #070711;
    --surface: #0f0f1a;
    --card: #13131f;
    --border: rgba(255,255,255,0.07);
    --accent: #6c63ff;
    --accent2: #00d4ff;
    --accent3: #ff6b9d;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --success: #00e5a0;
    --warning: #ffb347;
    --danger: #ff4d6d;
    --font-head: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --radius: 16px;
    --shadow: 0 8px 40px rgba(108,99,255,0.15);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .bg-orbs {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
  }
  .orb {
    position: absolute; border-radius: 50%;
    filter: blur(80px); opacity: 0.25;
  }
  .orb-1 { width: 500px; height: 500px; background: var(--accent); top: -150px; left: -100px; animation: float1 8s ease-in-out infinite; }
  .orb-2 { width: 400px; height: 400px; background: var(--accent2); bottom: -100px; right: -80px; animation: float2 10s ease-in-out infinite; }
  .orb-3 { width: 300px; height: 300px; background: var(--accent3); top: 50%; left: 50%; animation: float3 7s ease-in-out infinite; }
  @keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,40px)} }
  @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-25px,-30px)} }
  @keyframes float3 { 0%,100%{transform:translate(-50%,-50%)} 50%{transform:translate(-45%,-55%)} }
  
  .login-wrap {
    position: relative; z-index: 10;
    width: 460px; max-width: 95vw;
  }
  .brand {
    text-align: center; margin-bottom: 40px;
  }
  .brand-icon {
    width: 72px; height: 72px; margin: 0 auto 16px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 22px;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    box-shadow: 0 0 40px rgba(108,99,255,0.4);
    animation: pulse-glow 3s ease-in-out infinite;
  }
  @keyframes pulse-glow {
    0%,100% { box-shadow: 0 0 40px rgba(108,99,255,0.4); }
    50% { box-shadow: 0 0 60px rgba(108,99,255,0.7), 0 0 100px rgba(0,212,255,0.3); }
  }
  .brand h1 {
    font-family: var(--font-head);
    font-size: 32px; font-weight: 800;
    background: linear-gradient(135deg, #fff 0%, var(--accent2) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .brand p { color: var(--muted); font-size: 14px; margin-top: 6px; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 40px;
    backdrop-filter: blur(20px);
    box-shadow: var(--shadow);
  }
  .card h2 {
    font-family: var(--font-head);
    font-size: 22px; font-weight: 700;
    margin-bottom: 8px;
  }
  .card p.sub { color: var(--muted); font-size: 14px; margin-bottom: 32px; }

  .form-group { margin-bottom: 20px; }
  .form-group label {
    display: block; font-size: 12px; font-weight: 500;
    color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.08em; margin-bottom: 8px;
  }
  .form-group input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 15px;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }
  .form-group input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
  }
  .form-group input::placeholder { color: var(--muted); }

  .btn {
    width: 100%; padding: 15px;
    background: linear-gradient(135deg, var(--accent), #8b83ff);
    color: white; border: none; border-radius: 12px;
    font-family: var(--font-head); font-size: 16px; font-weight: 700;
    cursor: pointer; letter-spacing: 0.03em;
    transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
    position: relative; overflow: hidden;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(108,99,255,0.4); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .btn-loading::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    animation: shimmer 1s infinite;
  }
  @keyframes shimmer { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }

  .alert {
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 13px;
    margin-bottom: 20px;
    display: none;
  }
  .alert.error { background: rgba(255,77,109,0.12); border: 1px solid rgba(255,77,109,0.3); color: var(--danger); }
  .alert.success { background: rgba(0,229,160,0.1); border: 1px solid rgba(0,229,160,0.3); color: var(--success); }
  .alert.show { display: flex; align-items: center; gap: 8px; }

  .demo-creds {
    text-align: center; margin-top: 20px;
    padding: 12px 16px;
    background: rgba(108,99,255,0.08);
    border-radius: 10px;
    border: 1px solid rgba(108,99,255,0.15);
    font-size: 12px; color: var(--muted);
  }
  .demo-creds strong { color: var(--text); }

  /* Grid pattern overlay */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="bg-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div class="login-wrap">
  <div class="brand">
    <div class="brand-icon">👁️</div>
    <h1>FaceAttend</h1>
    <p>AI-Powered Face Recognition Attendance System</p>
  </div>
  <div class="card">
    <h2>Admin Login</h2>
    <p class="sub">Enter your credentials to access the dashboard</p>

    <div class="alert error" id="errorAlert">
      <span>⚠</span> <span id="errorMsg">Invalid credentials</span>
    </div>

    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter username" value="admin" autocomplete="username">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password" value="Admin@123" autocomplete="current-password">
    </div>
    <button class="btn" id="loginBtn" onclick="doLogin()">Sign In</button>

    <div class="demo-creds">
      Default credentials: <strong>admin</strong> / <strong>Admin@123</strong>
    </div>
  </div>
</div>

<script>
  
const API = (() => {
  const p = window.location.port;
  if (p === '8000' || p === '80' || p === '443' || p === '') return window.location.origin + '/api';
  return window.location.protocol + '//' + window.location.hostname + ':8000/api';
})();

function showError(msg) {
  const el = document.getElementById('errorAlert');
  document.getElementById('errorMsg').textContent = msg;
  el.classList.add('show', 'error');
  el.classList.remove('success');
}
function showSuccess(msg) {
  const el = document.getElementById('errorAlert');
  document.getElementById('errorMsg').textContent = msg;
  el.classList.add('show', 'success');
  el.classList.remove('error');
}

async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');

  if (!username || !password) { showError('Please enter username and password'); return; }

  btn.disabled = true;
  btn.textContent = 'Signing in...';
  btn.classList.add('btn-loading');

  try {
    const resp = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.detail || 'Login failed');
    
    localStorage.setItem('token', data.access_token);
    localStorage.setItem('username', data.username);
    localStorage.setItem('role', data.role);
    showSuccess('Login successful! Redirecting...');
    setTimeout(() => { window.location.href = '/dashboard'; }, 800);
  } catch(e) {
    showError(e.message);
    btn.disabled = false;
    btn.textContent = 'Sign In';
    btn.classList.remove('btn-loading');
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

// Redirect if already logged in
if (localStorage.getItem('token')) window.location.href = '/dashboard';
</script>
</body>
</html>
